
<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
<style>
.title{font-size:26px;font-family:Arial;text-anchor:middle}
.line{stroke:#64748b;stroke-width:3}
.node{fill:#1e293b;stroke:#22c55e;stroke-width:2}
.label{font-size:12px;font-family:Arial;text-anchor:middle}
.stage{font-size:12px;font-family:Arial;text-anchor:middle}
</style>

<text x="600" y="50" class="title">Strategic Intelligence Journey (0 → 10000 Drills)</text>
<line x1="100" y1="250" x2="1100" y2="250" class="line"/>

<circle cx="100" cy="250" r="8" class="node"/><text x="100" y="280" class="label">0</text>
<circle cx="350" cy="250" r="8" class="node"/><text x="350" y="280" class="label">3000</text>
<circle cx="650" cy="250" r="8" class="node"/><text x="650" y="280" class="label">6000</text>
<circle cx="900" cy="250" r="8" class="node"/><text x="900" y="280" class="label">8000</text>
<circle cx="1100" cy="250" r="8" class="node"/><text x="1100" y="280" class="label">10000</text>

<text x="350" y="220" class="stage">Structural Diagnosis</text>
<text x="650" y="220" class="stage">Systems Mastery</text>
<text x="900" y="220" class="stage">Strategic Intelligence</text>
<text x="1100" y="220" class="stage">Grand Strategy Thinking</text>

</svg>
