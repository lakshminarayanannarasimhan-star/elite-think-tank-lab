
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
<style>
.title { font-size:32px; font-family:Arial, Helvetica, sans-serif; text-anchor:middle; }
.layer { font-size:18px; font-family:Arial, Helvetica, sans-serif; text-anchor:middle; }
.box { fill:#0f172a; stroke:#22c55e; stroke-width:2; rx:12; ry:12; }
.small { fill:#111827; stroke:#38bdf8; stroke-width:1.5; rx:8; ry:8; }
.text { fill:white; font-size:14px; font-family:Arial, Helvetica, sans-serif; text-anchor:middle; dominant-baseline:middle; }
.arrow { stroke:#94a3b8; stroke-width:1.5; marker-end:url(#arrow); }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
</marker>
</defs>

<text x="600" y="50" class="title">Elite Think Tank Strategic Systems Map</text>

<!-- Layer titles -->
<text x="600" y="120" class="layer">Strategic Patterns</text>
<text x="600" y="300" class="layer">System Archetypes</text>
<text x="600" y="480" class="layer">Causal Mechanisms</text>
<text x="600" y="720" class="layer">Leverage Points</text>

<!-- Patterns -->
<rect x="150" y="150" width="180" height="40" class="small"/><text x="240" y="170" class="text">Platform Flywheel</text>
<rect x="360" y="150" width="180" height="40" class="small"/><text x="450" y="170" class="text">Coordination Trap</text>
<rect x="570" y="150" width="180" height="40" class="small"/><text x="660" y="170" class="text">Price War Spiral</text>
<rect x="780" y="150" width="180" height="40" class="small"/><text x="870" y="170" class="text">Infrastructure Lag</text>

<!-- Archetypes -->
<rect x="200" y="330" width="200" height="50" class="box"/><text x="300" y="355" class="text">Limits to Growth</text>
<rect x="450" y="330" width="200" height="50" class="box"/><text x="550" y="355" class="text">Success to the Successful</text>
<rect x="700" y="330" width="200" height="50" class="box"/><text x="800" y="355" class="text">Tragedy of the Commons</text>

<!-- Mechanisms -->
<rect x="120" y="510" width="160" height="40" class="small"/><text x="200" y="530" class="text">Growth</text>
<rect x="300" y="510" width="160" height="40" class="small"/><text x="380" y="530" class="text">Coordination Complexity</text>
<rect x="480" y="510" width="160" height="40" class="small"/><text x="560" y="530" class="text">Decision Bottleneck</text>
<rect x="660" y="510" width="160" height="40" class="small"/><text x="740" y="530" class="text">Network Effects</text>
<rect x="840" y="510" width="160" height="40" class="small"/><text x="920" y="530" class="text">Infrastructure Lag</text>

<!-- Leverage points -->
<rect x="220" y="760" width="200" height="50" class="box"/><text x="320" y="785" class="text">Structure</text>
<rect x="500" y="760" width="200" height="50" class="box"/><text x="600" y="785" class="text">Rules / Incentives</text>
<rect x="780" y="760" width="200" height="50" class="box"/><text x="880" y="785" class="text">Paradigms</text>

<!-- Arrows -->
<line x1="300" y1="190" x2="300" y2="330" class="arrow"/>
<line x1="550" y1="190" x2="550" y2="330" class="arrow"/>
<line x1="800" y1="190" x2="800" y2="330" class="arrow"/>

<line x1="300" y1="380" x2="200" y2="510" class="arrow"/>
<line x1="300" y1="380" x2="380" y2="510" class="arrow"/>
<line x1="550" y1="380" x2="560" y2="510" class="arrow"/>
<line x1="550" y1="380" x2="740" y2="510" class="arrow"/>
<line x1="800" y1="380" x2="920" y2="510" class="arrow"/>

<line x1="200" y1="550" x2="320" y2="760" class="arrow"/>
<line x1="560" y1="550" x2="600" y2="760" class="arrow"/>
<line x1="920" y1="550" x2="880" y2="760" class="arrow"/>

</svg>
