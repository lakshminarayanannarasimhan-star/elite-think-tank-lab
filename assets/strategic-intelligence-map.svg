
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
<style>
.node{fill:#111827;stroke:#22c55e;stroke-width:2}
.text{fill:white;font-family:Arial;font-size:14px;text-anchor:middle;dominant-baseline:middle}
.title{font-size:26px;font-family:Arial;text-anchor:middle}
</style>
<text x="500" y="40" class="title">Strategic Intelligence Map</text>

<circle cx="500" cy="150" r="60" class="node"/><text x="500" y="150" class="text">Strategic Patterns</text>
<circle cx="500" cy="300" r="60" class="node"/><text x="500" y="300" class="text">Archetypes</text>
<circle cx="500" cy="450" r="60" class="node"/><text x="500" y="450" class="text">Mechanisms</text>
<circle cx="500" cy="600" r="60" class="node"/><text x="500" y="600" class="text">Leverage Points</text>

<line x1="500" y1="210" x2="500" y2="240" stroke="white"/>
<line x1="500" y1="360" x2="500" y2="390" stroke="white"/>
<line x1="500" y1="510" x2="500" y2="540" stroke="white"/>
</svg>
