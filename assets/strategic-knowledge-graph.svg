
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
<style>
.node{fill:#1f2937;stroke:#38bdf8;stroke-width:2}
.text{fill:white;font-family:Arial;font-size:13px;text-anchor:middle;dominant-baseline:middle}
.title{font-size:26px;font-family:Arial;text-anchor:middle}
</style>

<text x="500" y="40" class="title">Strategic Knowledge Graph</text>

<circle cx="500" cy="350" r="70" class="node"/>
<text x="500" y="350" class="text">Strategic Thinking Core</text>

<circle cx="250" cy="200" r="55" class="node"/>
<text x="250" y="200" class="text">Mechanisms</text>

<circle cx="750" cy="200" r="55" class="node"/>
<text x="750" y="200" class="text">Archetypes</text>

<circle cx="250" cy="520" r="55" class="node"/>
<text x="250" y="520" class="text">Patterns</text>

<circle cx="750" cy="520" r="55" class="node"/>
<text x="750" y="520" class="text">Leverage</text>

<line x1="500" y1="350" x2="250" y2="200" stroke="white"/>
<line x1="500" y1="350" x2="750" y2="200" stroke="white"/>
<line x1="500" y1="350" x2="250" y2="520" stroke="white"/>
<line x1="500" y1="350" x2="750" y2="520" stroke="white"/>
</svg>
